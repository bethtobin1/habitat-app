<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Submit Habitat Restoration Data</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- MapLibre -->
  <link
    href="https://unpkg.com/maplibre-gl@3.4.0/dist/maplibre-gl.css"
    rel="stylesheet"
  />

  <!-- Mapbox Draw -->
  <link
    href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.0/mapbox-gl-draw.css"
    rel="stylesheet"
  />
</head>

<body>
  <h1>Submit Habitat Restoration Data</h1>

  <div id="map"></div>

  <form id="submitForm">
    <label>Project Name</label>
    <input type="text" id="projectName" required>

    <label>Habitat Type</label>
    <input type="text" id="habitatType" required>

    <label>Description</label>
    <textarea id="description"></textarea>

    <label>Upload Spatial File (optional)</label>
    <input type="file" id="fileInput">

    <button type="submit">Submit</button>
  </form>

  <!-- JS LIBRARIES (order matters!) -->
  <script src="https://unpkg.com/maplibre-gl@3.4.0/dist/maplibre-gl.js"></script>
  <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.0/mapbox-gl-draw.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
  <script src="https://unpkg.com/terraformer@1.0.12"></script>
  <script src="https://unpkg.com/terraformer-wkt-parser@1.2.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- YOUR SCRIPT LAST -->
  <script src="js/submission.js"></script>
</body>
</html>
