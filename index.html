<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Submit Habitat Restoration Data</title>

  css/styles.css

  <!-- MapLibre -->
  https://unpkg.com/maplibre-gl@3.4.0/dist/maplibre-gl.css
  https://unpkg.com/maplibre-gl@3.4.0/dist/maplibre-gl.js

  <!-- Mapbox Draw -->
  <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.0/mapbox-gl-draw.css" />
  <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.4.0/mapbox-gl-draw.js"></script>

  <!-- Turf -->
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

  <!-- Terraformer for WKT -->
  <script src="https://unpkg.com/terraformer"></script>
  <script src="https://unpkg.com/terraformer-wkt-parser"></script>

  <!-- Supabase (UMD version for browser) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <h1>Submit Habitat Restoration Data</h1>

  <div id="map"></div>

  <form id="submitForm">
    <label>Project Name</label>
    <input type="text" id="projectName" required>

    <label>Habitat Type</label>
    <input type="text" id="habitatType" required>

    <label>Description</label>
    <textarea id="description"></textarea>

    <label>Upload Spatial File (optional)</label>
    <input type="file" id="fileInput">

    <button type="submit">Submit</button>
  </form>

  <!-- Load our app code last -->
  <script type="module" src="js/submission.js"></script>
</body>
</html>
